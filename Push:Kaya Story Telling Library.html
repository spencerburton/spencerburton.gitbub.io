<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Push / KayaPush Storytelling Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --surface3: #222840;
    --border: #2a3050;
    --accent: #f4a326;
    --accent2: #e85d2f;
    --accent3: #3ecf8e;
    --text: #e8eaf0;
    --text2: #8b93b0;
    --text3: #555e80;
    --pill-bg: #1e2538;
    --pill-text: #7b86a8;
    --card-hover: #1a2035;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- HEADER ---- */
  .header {
    background: linear-gradient(135deg, #0d0f14 0%, #141828 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1380px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    color: #000;
    letter-spacing: -1px;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  .story-count-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }

  .story-count-badge span {
    color: var(--accent);
    font-weight: 500;
  }

  /* ---- LAYOUT ---- */
  .main-layout {
    max-width: 1380px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    min-height: calc(100vh - 90px);
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 90px;
    height: calc(100vh - 90px);
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 20px 10px;
  }

  .feature-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    border-right: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .feature-nav-item:hover { background: var(--surface2); }

  .feature-nav-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .feature-nav-item.active .feature-nav-name { color: var(--accent); }

  .feature-nav-name {
    font-size: 13.5px;
    color: var(--text2);
    font-weight: 400;
    flex: 1;
    line-height: 1.3;
  }

  .feature-nav-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface3);
    color: var(--text3);
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .feature-nav-item.active .feature-nav-count {
    background: rgba(244,163,38,0.15);
    color: var(--accent);
  }

  /* Filter sections */
  .filter-section {
    padding: 20px 20px 0;
    margin-top: 10px;
    border-top: 1px solid var(--border);
  }

  .filter-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .filter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-pill {
    background: var(--pill-bg);
    border: 1px solid var(--border);
    color: var(--pill-text);
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .filter-pill:hover { border-color: var(--accent); color: var(--accent); }

  .filter-pill.active {
    background: rgba(244,163,38,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .clear-filters-btn {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
  }

  .clear-filters-btn:hover { color: var(--text2); }

  /* ---- MAIN CONTENT ---- */
  .content {
    padding: 28px 36px;
    overflow-y: auto;
  }

  /* Home / Feature Grid */
  .home-view { display: block; }
  .feature-view { display: none; }

  .home-prompt {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .home-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .feature-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .feature-tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .feature-tile:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateY(-2px);
  }

  .feature-tile:hover::before { opacity: 1; }

  .feature-tile-icon {
    font-size: 24px;
    margin-bottom: 10px;
  }

  .feature-tile-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .feature-tile-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  /* Feature view header */
  .feature-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }

  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .feature-header-title {
    flex: 1;
  }

  .feature-header-name {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .feature-header-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* Story Cards */
  .story-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .story-card:hover { border-color: var(--surface3); }
  .story-card.expanded { border-color: var(--accent); }

  .story-card-header {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .story-card-main { flex: 1; }

  .story-title {
    font-size: 15.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .story-summary {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.5;
  }

  .story-tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .story-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .tag-feature {
    background: rgba(62,207,142,0.1);
    color: var(--accent3);
    border: 1px solid rgba(62,207,142,0.2);
  }

  .tag-usecase {
    background: rgba(244,163,38,0.1);
    color: var(--accent);
    border: 1px solid rgba(244,163,38,0.2);
  }

  .tag-pain {
    background: rgba(232,93,47,0.1);
    color: var(--accent2);
    border: 1px solid rgba(232,93,47,0.2);
  }

  .tag-persona {
    background: rgba(139,147,176,0.1);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .expand-toggle {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text3);
    transition: all 0.2s;
    margin-top: 2px;
  }

  .story-card.expanded .expand-toggle {
    background: rgba(244,163,38,0.12);
    border-color: var(--accent);
    color: var(--accent);
    transform: rotate(180deg);
  }

  .story-card-body {
    display: none;
    padding: 0 22px 22px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .story-card.expanded .story-card-body { display: block; }

  .body-section {
    margin-top: 18px;
  }

  .body-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 7px;
  }

  .body-text {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.65;
  }

  .full-story-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.7;
    font-style: italic;
  }

  .callout-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 18px;
  }

  @media (max-width: 680px) { .callout-row { grid-template-columns: 1fr; } }

  .callout-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .callout-box .body-label { margin-bottom: 5px; }

  .callout-box .body-text {
    font-size: 13px;
  }

  .transition-box {
    background: rgba(62,207,142,0.06);
    border: 1px solid rgba(62,207,142,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 12px;
  }

  .followup-box {
    background: rgba(244,163,38,0.06);
    border: 1px solid rgba(244,163,38,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 12px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 15px;
  }

  .no-results strong {
    display: block;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text2);
    margin-bottom: 8px;
  }

  /* All stories view */
  .stories-view-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .results-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  .results-label span { color: var(--accent); }

  /* Accent bar on cards when showing cross-feature */
  .story-card .feature-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: rgba(244,163,38,0.08);
    color: var(--accent);
    border: 1px solid rgba(244,163,38,0.2);
    padding: 3px 8px;
    border-radius: 20px;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-mark">PK</div>
      <div>
        <div class="header-title">Storytelling Library</div>
        <div class="header-sub">Push / KayaPush · Sales Enablement</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="Search stories, pain points, keywords…">
    </div>
    <div class="story-count-badge">
      <span id="totalCount">55</span> stories across <span id="featureCount">17</span> features
    </div>
  </div>
</div>

<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-label">Features</div>
    <div id="featureNav"></div>

    <div class="filter-section">
      <div class="filter-section-label">Sales Use Case</div>
      <div class="filter-pills" id="usecasePills"></div>
    </div>

    <div class="filter-section">
      <div class="filter-section-label">Pain Theme</div>
      <div class="filter-pills" id="painPills"></div>
    </div>

    <div class="filter-section" style="padding-bottom:20px;">
      <div class="filter-section-label">Audience</div>
      <div class="filter-pills" id="personaPills"></div>
      <button class="clear-filters-btn" id="clearFilters" style="display:none;">✕ Clear all filters</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <div class="home-view" id="homeView">
      <div class="home-prompt">Which feature do you need a story for?</div>
      <div class="home-sub">Select a feature below — or use search and filters to find the right story fast.</div>
      <div class="feature-grid" id="featureGrid"></div>
    </div>

    <div class="feature-view" id="featureView">
      <div class="feature-header">
        <button class="back-btn" id="backBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
          All Features
        </button>
        <div class="feature-header-title">
          <div class="feature-header-name" id="featureViewName"></div>
          <div class="feature-header-count" id="featureViewCount"></div>
        </div>
      </div>
      <div class="story-list" id="featureStoryList"></div>
    </div>

    <div id="searchView" style="display:none;">
      <div class="stories-view-header">
        <div class="feature-header-name" style="font-family:'DM Serif Display',serif;font-size:22px;">Search Results</div>
        <div class="results-label" id="searchResultsLabel"></div>
      </div>
      <div class="story-list" id="searchStoryList"></div>
    </div>
  </main>
</div>

<script>
// ========== DATA ==========
const FEATURES = [
  { id: 'ats', name: 'Applicant Tracking System', icon: '🎯', short: 'ATS / Hiring' },
  { id: 'onboarding', name: 'Digital Onboarding', icon: '📋', short: 'Digital Onboarding' },
  { id: 'chat', name: 'Chat & Communication', icon: '💬', short: 'Chat / Comms' },

  { id: 'surveys', name: 'Engagement Surveys', icon: '📊', short: 'Surveys' },
  { id: 'performance', name: 'Performance Reviews', icon: '⭐', short: 'Performance' },
  { id: 'managerapp', name: 'Manager App & Remote Visibility', icon: '📱', short: 'Manager App' },
  { id: 'cacompilance', name: 'California Compliance', icon: '⚖️', short: 'CA Compliance' },
];

const STORIES = [
  {
    id: 1,
    title: 'The Keg: Paper Resumes Getting Lost',
    features: ['ats'],
    summary: 'At The Keg, paper resumes dropped off by walk-in candidates would sit in a mailbox, get misplaced, or never reach the right manager — costing top candidates.',
    fullStory: 'At The Keg, resumes were still being collected by hand. Candidates would walk in, drop off a paper resume, and then that resume might sit in a mailbox, get misplaced, or never make it to the right manager. Strong candidates could easily be missed simply because the process was manual.',
    pain: 'Manual hiring creates lost resumes, missed handoffs, slow follow-up, and poor candidate experience.',
    impact: 'Strong candidates hired elsewhere due to slow or missed response.',
    howToSay: '"Restaurants often tell us the same thing: someone drops off a great resume, it gets put in the wrong spot, and by the time the hiring manager sees it, that person has already taken another job. With Push, that same candidate scans a QR code, lands directly in the ATS, and your managers can act immediately."',
    usecases: ['Discovery', 'Demo'],
    painThemes: ['Hiring bottlenecks', 'Admin burden'],
    personas: ['Owner', 'General Manager'],
    tags: ['ATS', 'QR code', 'candidate', 'hiring', 'paper resumes', 'walk-in'],
    whyItWorks: 'Every restaurant GM has lived this exact moment. It creates instant recognition and frames the ATS as a simple rescue — not a complex system.',
    bestTime: 'During discovery when the prospect mentions inconsistent hiring or missed candidates.',
    whatProspectFeels: 'Frustrated at having lost good people due to a broken process.',
    transition: '"Let me give you a quick example of what this looks like in practice…"',
    followup: '"Does that sound familiar — has that ever happened with a strong candidate at your location?"'
  },
  {
    id: 2,
    title: 'Earls: Patio Season Hiring Chaos',
    features: ['ats'],
    summary: 'Earls needed to rapidly scale from ~30 to 70 employees for patio season — and every existing hiring problem got multiplied when applicant volume spiked.',
    fullStory: 'During patio season, restaurants may need to double their staff quickly. One rep shared the example of Earls going from roughly 30 to 70 employees once patio season opened. The issue is not just "more hiring"; it is that every existing hiring pain gets multiplied when applicant volume spikes.',
    pain: 'More resumes, more job posts, more manager handoffs, more missed follow-ups, and more chaos during seasonal hiring.',
    impact: 'Teams unable to keep pace with seasonal volume, resulting in understaffing or missed quality candidates.',
    howToSay: '"When patio season hits, your hiring volume does not just increase — your hiring problems double. If resumes are already hard to track in January, they become almost impossible to manage in May. Push gives every applicant one path into the ATS, so your team can focus on interviewing and hiring instead of chasing resumes."',
    usecases: ['Discovery', 'Demo', 'Closing / Urgency'],
    painThemes: ['Hiring bottlenecks', 'Admin burden'],
    personas: ['Owner', 'General Manager', 'Operator'],
    tags: ['ATS', 'seasonal hiring', 'patio season', 'high volume', 'applicant flow'],
    whyItWorks: 'Reframes volume as a risk multiplier — not just an inconvenience — creating urgency around solving the problem before peak season.',
    bestTime: 'Seasonal businesses or any prospect approaching a growth phase.',
    whatProspectFeels: 'Anxious about how to manage an upcoming wave of hiring without a better system.',
    transition: '"Let me give you a quick example of what happens when hiring season hits without the right infrastructure…"',
    followup: '"What does your hiring process look like when you are ramping up — how do you keep track of all the applicants?"'
  },
  {
    id: 3,
    title: 'Manager Handoff Breakdown',

// ===== FILTER OPTIONS =====
const USE_CASES = ['Discovery', 'Demo', 'Objection Handling', 'Follow-Up', 'Closing / Urgency', 'Cold Call'];
const PAIN_THEMES = ['Admin burden', 'Compliance risk', 'Labor cost', 'Payroll errors', 'Scheduling inefficiency', 'Lack of visibility', 'Multi-location complexity', 'Hiring bottlenecks'];
const PERSONAS = ['Owner', 'Operator', 'HR Leader', 'Payroll Leader', 'Finance Leader', 'General Manager', 'Multi-Unit Executive'];

// ===== STATE =====
let activeFeature = null;
let searchQuery = '';
let activeUsecases = [];
let activePains = [];
let activePersonas = [];

// ===== HELPERS =====
function getStoriesForFeature(featureId) {
  return STORIES.filter(s => s.features.includes(featureId));
}

function filterStories(stories) {
  return stories.filter(s => {
    const searchStr = (s.title + ' ' + s.summary + ' ' + s.pain + ' ' + (s.tags||[]).join(' ')).toLowerCase();
    if (searchQuery && !searchStr.includes(searchQuery.toLowerCase())) return false;
    if (activeUsecases.length && !activeUsecases.some(u => s.usecases.includes(u))) return false;
    if (activePains.length && !activePains.some(p => s.painThemes.includes(p))) return false;
    if (activePersonas.length && !activePersonas.some(p => s.personas.includes(p))) return false;
    return true;
  });
}

// ===== RENDER =====
function getStoryCard(story, showFeatureBadge=false) {
  const featureNames = story.features.map(fid => {
    const f = FEATURES.find(x => x.id === fid);
    return f ? f.short : fid;
  });

  const tagChips = (story.tags||[]).slice(0,5).map(t => `<span class="story-tag tag-persona">${t}</span>`).join('');
  const usecaseChips = (story.usecases||[]).map(u => `<span class="story-tag tag-usecase">${u}</span>`).join('');
  const painChips = (story.painThemes||[]).map(p => `<span class="story-tag tag-pain">${p}</span>`).join('');

  const featureBadgesHtml = showFeatureBadge ? featureNames.map(fn => `<span class="feature-badge">📌 ${fn}</span>`).join('') : '';

  return `
    <div class="story-card" id="card-${story.id}">
      <div class="story-card-header" onclick="toggleCard(${story.id})">
        <div class="story-card-main">
          ${featureBadgesHtml}
          <div class="story-title">${story.title}</div>
          <div class="story-summary">${story.summary}</div>
          <div class="story-tags-row">${usecaseChips}${painChips}</div>
        </div>
        <div class="expand-toggle">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
      <div class="story-card-body">
        <div class="body-section">
          <div class="body-label">Full Story / Talking Track</div>
          <div class="full-story-box">${story.fullStory}</div>
        </div>
        <div class="body-section">
          <div class="body-label">How to Say It in a Call</div>
          <div class="full-story-box" style="border-left-color: var(--accent2); font-style: normal;">${story.howToSay}</div>
        </div>
        <div class="callout-row">
          <div class="callout-box">
            <div class="body-label">Pain Point It Illustrates</div>
            <div class="body-text">${story.pain}</div>
          </div>
          <div class="callout-box">
            <div class="body-label">Business Impact / Outcome</div>
            <div class="body-text">${story.impact}</div>
          </div>
          <div class="callout-box">
            <div class="body-label">Why This Story Works</div>
            <div class="body-text">${story.whyItWorks}</div>
          </div>
          <div class="callout-box">
            <div class="body-label">Best Time to Use It</div>
            <div class="body-text">${story.bestTime}</div>
          </div>
        </div>
        <div class="body-section">
          <div class="body-label">What Problem It Makes the Prospect Feel</div>
          <div class="body-text">${story.whatProspectFeels}</div>
        </div>
        ${story.personas && story.personas.length ? `<div class="body-section"><div class="body-label">Best-Fit Audience</div><div class="story-tags-row">${story.personas.map(p=>`<span class="story-tag tag-persona">${p}</span>`).join('')}</div></div>` : ''}
        <div class="body-section">
          <div class="body-label">Feature Tags</div>
          <div class="story-tags-row">${featureNames.map(fn=>`<span class="story-tag tag-feature">${fn}</span>`).join('')}${tagChips}</div>
        </div>
        ${story.transition ? `<div class="transition-box"><div class="body-label" style="color:var(--accent3);">Suggested Transition</div><div class="body-text" style="font-style:italic;">${story.transition}</div></div>` : ''}
        ${story.followup ? `<div class="followup-box"><div class="body-label" style="color:var(--accent);">Suggested Follow-Up Question</div><div class="body-text" style="font-style:italic;">${story.followup}</div></div>` : ''}
      </div>
    </div>
  `;
}

function renderFeatureNav() {
  const nav = document.getElementById('featureNav');
  nav.innerHTML = `<button class="feature-nav-item ${!activeFeature ? 'active' : ''}" onclick="showHome()">
    <span class="feature-nav-name">🏠 All Features</span>
    <span class="feature-nav-count">${STORIES.length}</span>
  </button>` +
  FEATURES.map(f => {
    const count = getStoriesForFeature(f.id).length;
    return `<button class="feature-nav-item ${activeFeature === f.id ? 'active' : ''}" onclick="showFeature('${f.id}')">
      <span class="feature-nav-name">${f.icon} ${f.name}</span>
      <span class="feature-nav-count">${count}</span>
    </button>`;
  }).join('');
}

function renderFeatureGrid() {
  const grid = document.getElementById('featureGrid');
  grid.innerHTML = FEATURES.map(f => {
    const count = getStoriesForFeature(f.id).length;
    return `<div class="feature-tile" onclick="showFeature('${f.id}')">
      <div class="feature-tile-icon">${f.icon}</div>
      <div class="feature-tile-name">${f.name}</div>
      <div class="feature-tile-count">${count} ${count === 1 ? 'Story' : 'Stories'}</div>
    </div>`;
  }).join('');
}

function renderFilterPills() {
  document.getElementById('usecasePills').innerHTML = USE_CASES.map(u =>
    `<span class="filter-pill ${activeUsecases.includes(u)?'active':''}" onclick="toggleFilter('usecase','${u}')">${u}</span>`
  ).join('');
  document.getElementById('painPills').innerHTML = PAIN_THEMES.map(p =>
    `<span class="filter-pill ${activePains.includes(p)?'active':''}" onclick="toggleFilter('pain','${p}')">${p}</span>`
  ).join('');
  document.getElementById('personaPills').innerHTML = PERSONAS.map(p =>
    `<span class="filter-pill ${activePersonas.includes(p)?'active':''}" onclick="toggleFilter('persona','${p}')">${p}</span>`
  ).join('');
  const hasFilters = activeUsecases.length || activePains.length || activePersonas.length;
  document.getElementById('clearFilters').style.display = hasFilters ? 'block' : 'none';
}

function showHome() {
  activeFeature = null;
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('featureView').style.display = 'none';
  document.getElementById('searchView').style.display = 'none';
  renderFeatureNav();
  renderFeatureGrid();
}

function showFeature(featureId) {
  activeFeature = featureId;
  const feature = FEATURES.find(f => f.id === featureId);
  const stories = filterStories(getStoriesForFeature(featureId));

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('featureView').style.display = 'block';
  document.getElementById('searchView').style.display = 'none';

  document.getElementById('featureViewName').textContent = feature.icon + ' ' + feature.name;
  document.getElementById('featureViewCount').textContent = `${stories.length} ${stories.length === 1 ? 'story' : 'stories'} found`;

  document.getElementById('featureStoryList').innerHTML = stories.length
    ? stories.map(s => getStoryCard(s, false)).join('')
    : '<div class="no-results"><strong>No stories match your filters</strong>Try adjusting or clearing your filters.</div>';

  renderFeatureNav();
}

function showSearchResults() {
  activeFeature = null;
  const allStories = filterStories(STORIES);
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('featureView').style.display = 'none';
  document.getElementById('searchView').style.display = 'block';
  document.getElementById('searchResultsLabel').innerHTML = `<span>${allStories.length}</span> ${allStories.length === 1 ? 'story' : 'stories'} found`;
  document.getElementById('searchStoryList').innerHTML = allStories.length
    ? allStories.map(s => getStoryCard(s, true)).join('')
    : '<div class="no-results"><strong>No stories match your search</strong>Try different keywords or clear your filters.</div>';
  renderFeatureNav();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

function toggleFilter(type, value) {
  if (type === 'usecase') {
    const idx = activeUsecases.indexOf(value);
    if (idx >= 0) activeUsecases.splice(idx, 1); else activeUsecases.push(value);
  } else if (type === 'pain') {
    const idx = activePains.indexOf(value);
    if (idx >= 0) activePains.splice(idx, 1); else activePains.push(value);
  } else if (type === 'persona') {
    const idx = activePersonas.indexOf(value);
    if (idx >= 0) activePersonas.splice(idx, 1); else activePersonas.push(value);
  }
  renderFilterPills();
  refreshCurrentView();
}

function refreshCurrentView() {
  if (searchQuery || activeUsecases.length || activePains.length || activePersonas.length) {
    if (activeFeature) {
      showFeature(activeFeature);
    } else if (searchQuery) {
      showSearchResults();
    } else {
      showSearchResults();
    }
  } else {
    if (activeFeature) showFeature(activeFeature);
    else showHome();
  }
}

document.getElementById('clearFilters').addEventListener('click', () => {
  activeUsecases = []; activePains = []; activePersonas = [];
  renderFilterPills();
  refreshCurrentView();
});

document.getElementById('backBtn').addEventListener('click', showHome);

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  if (searchQuery) {
    showSearchResults();
  } else if (!activeUsecases.length && !activePains.length && !activePersonas.length) {
    if (activeFeature) showFeature(activeFeature);
    else showHome();
  } else {
    refreshCurrentView();
  }
});

// ===== INIT =====
renderFilterPills();
showHome();
</script>
